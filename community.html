<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄盾开发者社区 | XuanDun Community</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6;      
            --primary-hover: #2563eb;
            --bg-body: #f3f4f6;       
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        /* --- 顶部导航栏 --- */
        header { background: var(--bg-card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
        .navbar { max-width: 1400px; margin: 0 auto; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-menu a { color: var(--text-sub); text-decoration: none; margin-left: 20px; font-weight: 500; transition: 0.2s; font-size: 0.95rem; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--primary); }

        /* --- 主布局 (Grid) --- */
        .layout-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            gap: 24px;
            max-width: 1400px;
            margin: 24px auto;
            padding: 0 20px;
            flex: 1;
            width: 100%;
        }

        /* --- 左侧边栏  --- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        
        .sidebar-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        
        .channel-group { padding: 12px; }
        .channel-title { font-size: 0.8rem; text-transform: uppercase; color: var(--text-sub); font-weight: 700; padding: 0 12px 8px; margin-top: 8px; }
        
        .channel-btn {
            display: flex; align-items: center; width: 100%; text-align: left;
            padding: 10px 12px; border: none; background: transparent;
            color: var(--text-sub); border-radius: 8px; cursor: pointer;
            font-size: 0.95rem; transition: 0.2s; margin-bottom: 2px;
        }
        .channel-btn i { width: 24px; text-align: center; margin-right: 8px; font-size: 1rem; }
        .channel-btn:hover { background-color: #eff6ff; color: var(--primary); }
        .channel-btn.active { background-color: #eff6ff; color: var(--primary); font-weight: 600; }

        /* 公告小组件 */
        .notice-widget { padding: 20px; }
        .notice-widget h3 { font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .notice-item { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
        .notice-item:last-child { border: none; margin: 0; padding: 0; }
        .notice-date { font-size: 0.75rem; color: #9ca3af; display: block; margin-top: 4px; }

        /* --- 右侧主内容区 --- */
        .main-stage { display: flex; flex-direction: column; gap: 20px; }

        /* 欢迎横幅 */
        .hero-banner {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-radius: 12px; padding: 30px; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .hero-text h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .hero-text p { opacity: 0.9; font-size: 0.95rem; }
        .github-btn {
            background: rgba(255,255,255,0.2); color: white; text-decoration: none;
            padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; transition: 0.2s;
            display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.3);
        }
        .github-btn:hover { background: rgba(255,255,255,0.3); }

        /* 讨论区容器 */
        .discussion-container {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            min-height: 500px;
        }
        
        .discussion-header {
            border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .discussion-header h2 { font-size: 1.25rem; color: var(--text-main); }
        .discussion-badge {
            background: #dbeafe; color: var(--primary); font-size: 0.75rem; 
            padding: 2px 8px; border-radius: 12px; font-weight: 600;
        }

        /* 加载动画 */
        .loading-spinner {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 200px; color: var(--text-sub);
        }
        .fa-spinner { animation: spin 1s linear infinite; font-size: 2rem; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 响应式 */
        @media (max-width: 768px) {
            .layout-container { grid-template-columns: 1fr; }
            .sidebar { display: none; } 
            .navbar { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <a href="index.html" class="logo">
                <i class="fas fa-shield-alt" style="color: var(--primary);"></i>
                玄盾开发者社区
            </a>
            <nav class="nav-menu">
                <a href="index.html">首页</a>
                <a href="docs.html">文档</a>
                <a href="community.html" class="active">社区</a>
            </nav>
        </div>
    </header>

    <div class="layout-container">
        
        <aside class="sidebar">
            <div class="sidebar-card">
                <div class="channel-group">
                    <div class="channel-title">社区频道</div>
                    <button class="channel-btn active" onclick="switchChannel('综合大厅', 'General')">
                        <i class="fas fa-comments"></i> 综合大厅
                    </button>
                    <button class="channel-btn" onclick="switchChannel('建议反馈', 'Ideas')">
                        <i class="fas fa-lightbulb"></i> 建议反馈
                    </button>
                    <button class="channel-btn" onclick="switchChannel('技术问答', 'Q&A')">
                        <i class="fas fa-question-circle"></i> 技术问答
                    </button>
                    <button class="channel-btn" onclick="switchChannel('作品展示', 'Show and tell')">
                        <i class="fas fa-laptop-code"></i> 作品展示
                    </button>
                </div>
                
                <div class="channel-title" style="padding-left:12px; margin-top:10px;">资源链接</div>
                <div class="channel-group">
                    <button class="channel-btn" onclick="window.open('https://github.com/neflibata-feng/XuanDun', '_blank')">
                        <i class="fab fa-github"></i> GitHub 仓库
                    </button>
                    <button class="channel-btn" onclick="location.href='docs.html'">
                        <i class="fas fa-book"></i> 开发文档
                    </button>
                </div>
            </div>

            <div class="sidebar-card notice-widget">
                <h3 style="color: #ea580c;"><i class="fas fa-bullhorn"></i> 最新公告</h3>
            </div>
        </aside>

        <main class="main-stage">
            
            <div class="hero-banner">
                <div class="hero-text">
                    <h1>👋 欢迎来到玄盾社区</h1>
                    <p>这里是开发者交流的核心地带，请文明发言，分享你的创意。</p>
                </div>
                <a href="https://github.com/neflibata-feng/XuanDun/discussions" target="_blank" class="github-btn">
                    <i class="fas fa-external-link-alt"></i> 前往 GitHub 原版
                </a>
            </div>

            <div class="discussion-container">
                <div class="discussion-header">
                    <h2 id="currentChannelTitle"><i class="fas fa-comments" style="color:var(--primary)"></i> 综合大厅</h2>
                    <span class="discussion-badge" id="currentCategoryBadge">General</span>
                </div>

                <div id="giscus-frame">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner"></i>
                        <p>正在连接 GitHub 社区...</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <footer style="text-align: center; padding: 30px; color: var(--text-sub); font-size: 0.9rem;">
        <p>© 2026 玄盾 OpenAPI | 基于 GitHub Discussions 构建</p>
    </footer>

    <script>
        const CONFIG = {
            repo: "neflibata-feng/XuanDun",
            repoId: "R_kgDOQDdIrQ",
            categoryId: "DIC_kwDOQDdIrc4C0cdO" 
        };
        document.addEventListener('DOMContentLoaded', () => {
            loadGiscus('综合大厅', 'General');
        });
        function switchChannel(channelName, category) {
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');        
            document.getElementById('currentChannelTitle').innerHTML = channelName;
            document.getElementById('currentCategoryBadge').innerText = category;
            loadGiscus(channelName, category);
        }

        function loadGiscus(term, category) {
            const frame = document.getElementById('giscus-frame');

            frame.innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p>正在切换至 ${term}...</p>
                </div>
            `;


            const script = document.createElement('script');
            script.src = "https://giscus.app/client.js";
            
            script.setAttribute('data-repo', CONFIG.repo);
            script.setAttribute('data-repo-id', CONFIG.repoId);            
            script.setAttribute('data-category', "General"); 
            script.setAttribute('data-category-id', CONFIG.categoryId);
            script.setAttribute('data-mapping', "title");
            script.setAttribute('data-term', term); 
            script.setAttribute('data-reactions-enabled', "1");
            script.setAttribute('data-emit-metadata', "0");
            script.setAttribute('data-input-position', "top");
            script.setAttribute('data-theme', "light");
            script.setAttribute('data-lang', "zh-CN");
            script.setAttribute('crossorigin', "anonymous");
            script.async = true;
            setTimeout(() => {
                frame.innerHTML = '';
                frame.appendChild(script);
            }, 300);
        }
    </script>
</body>
</html>
